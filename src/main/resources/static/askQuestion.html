<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>index page</title>
    <link rel="stylesheet" href="style.css?v=6">
</head>

<body id="body_id" data-default-theme="dark">
    <div id="top_bar">
        <button id="menu_button" type="button" aria-controls="menu_panel" aria-expanded="false" onclick="toggleMenu()">Menu</button>
        <h1 id="top_title">Ask Questions</h1>
        <div id="top_right">
            <div id="brand_logo">
                <img class="logo-mark" src="/branding/timmygoestripping-logo.svg" data-logo-light="/branding/timmygoestripping-logo.svg" data-logo-dark="/branding/timmygoestripping-logo-white.svg" alt="TimmyGoesTripping logo">
            </div>
        </div>
    </div>
    <div id="menu_overlay" onclick="closeMenu()"></div>
    <aside id="menu_panel" class="menu_panel" aria-hidden="true">
        <div class="menu_title">Menu</div>

        <a href="/landing/about.html" onclick="closeMenu()">About</a>

                <span class="theme-toggle-icon" aria-hidden="true"></span>
            </button>
        </div>
    </aside>
    
    <div id="response"></div>

    <div id="ask_bar">
    <input id="question" placeholder="ask any question from OpenAI"/>
    <button onclick="ask()">send</button>
    <button onclick="clearChat()">clear</button>
    </div>
<script src="script.js?v=5"></script>
